# New-API Docker Compose Configuration (连接本地 PG 和 Redis)
#
# 前置条件：
#   1. 本地 PostgreSQL 已启动 (192.168.251.2:5432)
#   2. 本地 Redis 已启动 (localhost:6379)
#   3. 已创建数据库和用户（见下方说明）
#
# PostgreSQL 初始化：
#   CREATE USER newapi WITH PASSWORD 'your_password';
#   CREATE DATABASE new-api OWNER newapi;
#   GRANT ALL PRIVILEGES ON DATABASE new-api TO newapi;
#
# 启动方式：
#   docker-compose up -d
#   访问 http://localhost:3000

services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      # PostgreSQL 连接配置
      # 格式: postgresql://用户名:密码@主机:端口/数据库名
      - SQL_DSN=postgresql://newapi:57bee75807044164@192.168.251.2:5432/newapi

      # Redis 连接配置
      # 使用 host.docker.internal 访问宿主机上的 Redis
      - REDIS_CONN_STRING=redis://:006e0b2853794870ad83551f6df8ce92@host.docker.internal:6379/0

      # 时区设置
      - TZ=Asia/Shanghai

      # 日志配置
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1

      # 可选配置（取消注释以启用）
      # - STREAMING_TIMEOUT=300
      # - SESSION_SECRET=random_string
      # - SYNC_FREQUENCY=60

    # 添加 host 映射，确保能访问宿主机服务
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 依赖服务（如果需要启动本地服务，可以在这里定义）
    # depends_on:
    #   - redis

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - new-api-network

# 如需在 Docker 中运行 Redis，取消以下注释
# redis:
#   image: redis:latest
#   container_name: redis
#   restart: always
#   command: ["redis-server", "--requirepass", "006e0b2853794870ad83551f6df8ce92"]
#   ports:
#     - "6379:6379"
#   networks:
#     - new-api-network

networks:
  new-api-network:
    driver: bridge
