# New-API Docker Compose Configuration
#
# 包含 PostgreSQL 和 Redis，无需单独安装。
#
# 启动方式：
#   docker-compose up -d
#   访问 http://localhost:3000
#
# ⚠️ 生产环境请修改所有默认密码！

services:
  new-api:
    build: .
    image: new-api:local
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://newapi:57bee75807044164@postgres:5432/newapi
      - REDIS_CONN_STRING=redis://:006e0b2853794870ad83551f6df8ce92@redis:6379/0
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: 57bee75807044164
      POSTGRES_DB: newapi
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newapi -d newapi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - new-api-network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    command: ["redis-server", "--requirepass", "006e0b2853794870ad83551f6df8ce92"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a 006e0b2853794870ad83551f6df8ce92 ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - new-api-network

volumes:
  pg_data:
  redis_data:

networks:
  new-api-network:
    driver: bridge
